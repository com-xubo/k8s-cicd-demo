apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
      - name: myapp
        image: 13230610263@163.com/myapp:latest   # 后面会自动替换
        imagePullPolicy: Always
        ports:
        - containerPort: 80
